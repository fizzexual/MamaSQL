name: mamasql

# Easiest way to run MamaSQL: pulls prebuilt images from GitHub Container
# Registry — no source checkout, no build step.
#
#   1. (optional) cp .env.example .env   and edit it
#   2. docker compose up -d
#   3. open http://localhost:5001
#
# To build the images yourself instead, use docker-compose.build.yml.

services:
  # The app: built UI served by nginx, which also proxies /api to the bridge.
  web:
    container_name: mamasql_web
    image: ghcr.io/fizzexual/mamasql-web:${MAMASQL_VERSION:-latest}
    ports:
      - "${WEB_PORT:-5001}:80"
    depends_on:
      - bridge
    restart: always

  # Opens real PostgreSQL / MySQL connections on the browser's behalf.
  # Reached only through the web container's /api proxy.
  bridge:
    container_name: mamasql_bridge
    image: ghcr.io/fizzexual/mamasql-bridge:${MAMASQL_VERSION:-latest}
    environment:
      BRIDGE_PORT: "5174"
      # SQLite database files live here — a named volume so they persist across
      # restarts and are shared by every browser/tab/port that connects.
      DATA_DIR: "/data"
    volumes:
      - sqlitedata:/data
    expose:
      - "5174"
    # Lets connections use host "host.docker.internal" to reach a database
    # running on your own machine (works on all platforms, incl. Linux).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  # --- Optional demo databases ---------------------------------------------
  # Connect from the app with host "postgres" / "mysql" (port 5432 / 3306).
  # Delete these two services if you only connect to your own databases.
  postgres:
    container_name: mamasql_postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-mamasql}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mamasql}
      POSTGRES_DB: ${DB_DATABASE:-demo}
    ports:
      - "${PG_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  mysql:
    container_name: mamasql_mysql
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-mamasql}
      MYSQL_DATABASE: ${DB_DATABASE:-demo}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    restart: always

volumes:
  pgdata:
  mysqldata:
  sqlitedata:
